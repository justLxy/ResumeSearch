<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ResumeSearch 简历检索</title>
    <link rel="icon" type="image/svg+xml" href="/static/favicon.svg" />
    <link rel="stylesheet" href="/static/styles.css?v=20260722-1" />
  </head>
  <body>
    <header class="search-header">
      <div class="brand">
        <span class="brand-kicker">简历检索平台</span>
        <strong>ResumeSearch</strong>
      </div>
      <div class="search-wrap">
        <div class="search-box">
          <span class="search-icon" aria-hidden="true"></span>
          <input id="searchInput" placeholder="输入岗位、技能、项目关键词" autocomplete="off" />
          <button id="searchButton" aria-label="检索简历">检索</button>
        </div>
        <div class="quick-queries" aria-label="快捷搜索">
          <span class="quick-label">快捷搜索</span>
          <button data-query="哈尔滨工业大学">哈尔滨工业大学</button>
          <button data-query="985或211硕士 做过推荐系统召回">985或211硕士 · 推荐系统</button>
          <button data-query="北京 硕士 3年以上 网络安全 渗透测试">北京 · 硕士 · 3年 · 网络安全</button>
          <button data-query="做过大模型 RAG 检索增强和向量数据库落地">大模型 RAG 向量检索（语义）</button>
        </div>
      </div>
      <div class="header-actions">
        <button id="uploadOpenButton" class="header-action-btn" type="button">上传简历</button>
        <div id="clusterStatus" class="cluster-status"><span></span><strong>ES</strong><em>检测中…</em></div>
      </div>
    </header>

    <main class="page">
      <section class="filters" aria-label="筛选条件">
        <div class="filter-head">
          <h2>筛选条件</h2>
        </div>
        <div class="filter-row">
          <span class="filter-label">学历</span>
          <div class="option-list">
            <label><input type="radio" name="degree" value="" checked />不限</label>
            <label><input type="radio" name="degree" value="博士" />博士</label>
            <label><input type="radio" name="degree" value="硕士" />硕士</label>
            <label><input type="radio" name="degree" value="本科" />本科</label>
          </div>
        </div>

        <div class="filter-row">
          <span class="filter-label">院校</span>
          <div id="schoolTierFilters" class="option-list">
            <label><input type="checkbox" name="schoolTier" value="985" />985<span class="tier-count" data-tier="985"></span></label>
            <label><input type="checkbox" name="schoolTier" value="211" />211<span class="tier-count" data-tier="211"></span></label>
            <label><input type="checkbox" name="schoolTier" value="双一流" />双一流<span class="tier-count" data-tier="双一流"></span></label>
            <label><input type="checkbox" name="schoolTier" value="c9" />C9<span class="tier-count" data-tier="c9"></span></label>
            <label title="海外 QS 前 100 院校"><input type="checkbox" name="schoolTier" value="qs50_overseas" />海外QS100<span class="tier-count" data-tier="qs50_overseas"></span></label>
            <label><input type="checkbox" name="schoolTier" value="其他" />其他<span class="tier-count" data-tier="其他"></span></label>
          </div>
        </div>

        <div class="filter-row">
          <span class="filter-label">经验</span>
          <div class="range-control">
            <input id="yearsRange" class="range" type="range" min="0" max="5" step="0.5" value="0" />
            <span id="yearsLabel" class="range-value">不限经验</span>
          </div>
        </div>

        <div class="filter-row">
          <span class="filter-label">城市</span>
          <div id="cityFilters" class="chip-list"></div>
        </div>

        <div class="filter-row">
          <span class="filter-label">技能</span>
          <div id="skillFilters" class="chip-list"></div>
        </div>
      </section>

      <section class="result-area">
        <section class="result-meta">
          <span>显示 <strong id="totalCount">0</strong> 条结果</span>
          <span id="queryMode">浏览全部候选人</span>
        </section>

        <section id="results" class="results"></section>
        <button id="loadMoreButton" class="load-more" type="button" hidden>加载更多</button>
      </section>
    </main>

    <div id="overlay" class="overlay"></div>
    <aside id="drawer" class="drawer">
      <div class="drawer-head">
        <div>
          <div id="drawerName" class="drawer-name"></div>
          <div id="drawerMeta" class="drawer-meta"></div>
        </div>
        <button id="drawerClose" class="icon-button" aria-label="关闭详情"><span aria-hidden="true">×</span></button>
      </div>
      <div id="drawerContent" class="drawer-content"></div>
    </aside>

    <div id="uploadOverlay" class="upload-overlay" hidden></div>
    <div id="uploadModal" class="upload-modal" role="dialog" aria-modal="true" aria-labelledby="uploadModalTitle" hidden>
      <div class="upload-modal-head">
        <div>
          <h2 id="uploadModalTitle">批量上传简历</h2>
          <p class="upload-modal-hint">支持 .doc 格式，可多选或拖拽；同名文件将被拒绝</p>
        </div>
        <button id="uploadCloseButton" class="icon-button" type="button" aria-label="关闭上传"><span aria-hidden="true">×</span></button>
      </div>
      <div id="uploadDropzone" class="upload-dropzone" tabindex="0">
        <input id="uploadFileInput" type="file" accept=".doc,application/msword" multiple hidden />
        <div class="upload-dropzone-icon" aria-hidden="true">↑</div>
        <p class="upload-dropzone-title">拖拽简历到此处，或点击选择文件</p>
        <p class="upload-dropzone-sub">仅 .doc · 可批量选择</p>
      </div>
      <div class="upload-list-wrap">
        <div class="upload-list-head">
          <span>待上传文件</span>
          <span id="uploadListCount">0 个</span>
        </div>
        <ul id="uploadFileList" class="upload-file-list"></ul>
        <p id="uploadEmptyHint" class="upload-empty-hint">尚未选择文件</p>
      </div>
      <div class="upload-modal-foot">
        <div id="uploadSummary" class="upload-summary"></div>
        <div class="upload-actions">
          <button id="uploadClearButton" class="ghost-button" type="button">清空</button>
          <button id="uploadSubmitButton" class="primary-button" type="button" disabled>开始上传</button>
        </div>
      </div>
    </div>

    <script src="/static/app.js?v=20260722-1"></script>
  </body>
</html>
